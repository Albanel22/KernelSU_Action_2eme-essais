name: Build Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - uses: actions/checkout@v4
    - name: Prepare Configuration
      run: |
        CONFIG_ENV=$(grep -w "CONFIG_ENV" config.env | head -n 1 | cut -d "=" -f 2)
        CONFIG_LIST=(
            KERNEL_SOURCE
            KERNEL_SOURCE_BRANCH
            KERNEL_CONFIG
            KERNEL_IMAGE_NAME
            ARCH
            ADD_LOCALVERSION_TO_FILENAME
            EXTRA_CMDS
            USE_CUSTOM_CLANG
            CUSTOM_CLANG_SOURCE
            CUSTOM_CLANG_BRANCH
            CUSTOM_CMDS
            CLANG_BRANCH
            CLANG_VERSION
            ENABLE_GCC_ARM64
            ENABLE_GCC_ARM32
            USE_CUSTOM_GCC_64
            CUSTOM_GCC_64_SOURCE
            CUSTOM_GCC_64_BRANCH
            CUSTOM_GCC_64_BIN
            USE_CUSTOM_GCC_32
            CUSTOM_GCC_32_SOURCE
            CUSTOM_GCC_32_BRANCH
            CUSTOM_GCC_32_BIN
            ENABLE_KERNELSU
            KERNELSU_TAG
            ADD_KPROBES_CONFIG
            DISABLE-LTO
            ADD_OVERLAYFS_CONFIG
            DISABLE_CC_WERROR
            APPLY_KSU_PATCH
            USE_CUSTOM_ANYKERNEL3
            CUSTOM_ANYKERNEL3_SOURCE
            CUSTOM_ANYKERNEL3_BRANCH
            ENABLE_CCACHE
            NEED_DTBO
            BUILD_BOOT_IMG
            SOURCE_BOOT_IMAGE
            KSU_EXPECTED_SIZE
            KSU_EXPECTED_HASH
            REMOVE_UNUSED_PACKAGES
        )

        for CONFIG in "${CONFIG_LIST[@]}"; do
            if [[ "$CONFIG" == "EXTRA_CMDS" || "$CONFIG" == "CUSTOM_CMDS" ]]; then
                echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
            else
                echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
            fi
        done

    - name: Remove unused packages
      if: env.REMOVE_UNUSED_PACKAGES ==false
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang-aosp
      if: env.USE_CUSTOM_CLANG != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang-aosp
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${{ env.CLANG_BRANCH }}/clang-${{ env.CLANG_VERSION }}.tar.gz
        tar -C clang-aosp/ -zxvf clang-${{ env.CLANG_VERSION }}.tar.gz

    - name: Download Custom-Clang
      if: env.USE_CUSTOM_CLANG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [[ ${{ env.CUSTOM_CLANG_SOURCE }} =~ git ]]; then
            if [[ ${{ env.CUSTOM_CLANG_SOURCE }} == *'.tar.gz' ]]; then
                wget -O clang.tar.gz ${{ env.CUSTOM_CLANG_SOURCE }}
                mkdir clang-aosp
                tar -C clang-aosp/ -zxvf clang.tar.gz
            else
                git clone ${{ env.CUSTOM_CLANG_SOURCE }} -b ${{ env.CUSTOM_CLANG_BRANCH }} clang-aosp --depth=1
            fi
        else
            wget -O clang.zip ${{ env.CUSTOM_CLANG_SOURCE }}
            mkdir clang-aosp
            unzip clang.zip -d clang-aosp/
        fi

    - name: Download Gcc-aosp
      if: env.USE_CUSTOM_GCC_64 != 'true' || env.USE_CUSTOM_GCC_32 != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ "${{ env.ENABLE_GCC_ARM64 }}" = "true" ]; then
            mkdir gcc-64
            wget -O gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-64/ -zxvf gcc-aarch64.tar.gz
            echo "GCC_64=CROSS_COMPILE=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        fi

        if [ "${{ env.ENABLE_GCC_ARM32 }}" = "true" ]; then
            mkdir gcc-32
            wget -O gcc-arm.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-32/ -zxvf gcc-arm.tar.gz
            echo "GCC_32=CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        fi

    - name: Download Custom-Gcc
      if: env.USE_CUSTOM_GCC_64 == 'true' || env.USE_CUSTOM_GCC_32 == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ "${{ env.USE_CUSTOM_GCC_64 }}" = "true" ]; then
          if [[ ${{ env.CUSTOM_GCC_64_SOURCE }} =~ git ]]; then
              if [[ ${{ env.CUSTOM_GCC_64_SOURCE }} == *'.tar.gz' ]]; then
                wget -O gcc-64.tar.gz ${{ env.CUSTOM_GCC_64_SOURCE }}
                mkdir gcc-64
                tar -C gcc-64/ -zxvf gcc-64.tar.gz
              else
                git clone ${{ env.CUSTOM_GCC_64_SOURCE }} -b ${{ env.CUSTOM_GCC_64_BRANCH }} gcc-64 --depth=1
              fi
          else
              wget -O gcc-64.zip ${{ env.CUSTOM_GCC_64_SOURCE }}
              mkdir gcc-64
              unzip gcc-64.zip -d gcc-64/
          fi
          echo "GCC_64=CROSS_COMPILE=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/${{ env.CUSTOM_GCC_64_BIN }}" >> $GITHUB_ENV
        fi

        if [ "${{ env.USE_CUSTOM_GCC_32 }}" = "true" ]; then
          if [[ ${{ env.CUSTOM_GCC_32_SOURCE }} =~ git ]]; then
              if [[ ${{ env.CUSTOM_GCC_32_SOURCE }} == *'.tar.gz' ]]; then
                wget -O gcc-32.tar.gz ${{ env.CUSTOM_GCC_32_SOURCE }}
                mkdir gcc-32
                tar -C gcc-32/ -zxvf gcc-32.tar.gz
              else
                git clone ${{ env.CUSTOM_GCC_32_SOURCE }} -b ${{ env.CUSTOM_GCC_32_BRANCH }} gcc-32 --depth=1
              fi
          else
            wget -O gcc-32.zip ${{ env.CUSTOM_GCC_32_SOURCE }}
            mkdir gcc-32
            unzip gcc-32.zip -d gcc-32/
          fi
          echo "GCC_32=CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/${{ env.CUSTOM_GCC_32_BIN }}" >> $GITHUB_ENV
        fi

    - name: Download mkbootimg tools
      if: env.BUILD_BOOT_IMG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://android.googlesource.com/platform/system/tools/mkbootimg tools -b master-kernel-build-2022 --depth=1

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
        if [[ ${{ env.ADD_LOCALVERSION_TO_FILENAME }} == 'true' ]]; then
          echo "LOCALVERSION=$(cat android-kernel/localversion 2>/dev/null || echo '')" >> $GITHUB_ENV
        else
          echo "LOCALVERSION=" >> $GITHUB_ENV
        fi

    - name: Download source boot image
      if: env.BUILD_BOOT_IMG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O boot-source.img ${{ env.SOURCE_BOOT_IMAGE }}
        if [ -f boot-source.img ]; then
            echo "FORMAT_MKBOOTING=$(python3 tools/unpack_bootimg.py --boot_img=boot-source.img --format mkbootimg)" >> $GITHUB_ENV
            echo "HAVE_SOURCE_BOOT_IMAGE=true" >> $GITHUB_ENV
        fi

    - name: Setup KernelSU Version
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # Vérification si le dossier KernelSU existe, sinon on le clone proprement
        if [ ! -d "KernelSU" ]; then
            echo "[!] Dossier KernelSU introuvable, clonage manuel en cours..."
            git clone https://github.com/tiann/KernelSU.git KernelSU
        fi
        
        # Application de la version stable v0.9.5
        cd KernelSU
        git fetch --tags
        git checkout v0.9.5
        echo "[+] Version de KernelSU verrouillée avec succès sur la v0.9.5 !"
        
    - name: Setup Configuration for Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # [IMPORTANT] On force la désactivation de VDSO32 directement dans le fichier source defconfig
        DEFCONFIG_FILE="arch/arm64/configs/vendor/sm8250-perf_defconfig"
        if [ -f "$DEFCONFIG_FILE" ]; then
            # On supprime les anciennes lignes CONFIG_VDSO32 si elles existent
            sed -i '/CONFIG_VDSO32/d' "$DEFCONFIG_FILE"
            # On écrit proprement la désactivation à la fin du fichier
            echo "CONFIG_VDSO32=n" >> "$DEFCONFIG_FILE"
            echo "[+] CONFIG_VDSO32=n a été injecté dans le defconfig."
        fi
        
        # 1. Restauration propre des fichiers modifiés si nécessaire
        git checkout HEAD arch/arm64/Makefile arch/arm64/kernel/vdso32/Makefile include/linux/mmu_notifier.h 2>/dev/null || true

        # 2. L'astuce du fantôme : Création préventive de l'en-tête généré pour éviter les erreurs de dépendance
        mkdir -p out/include/generated
        touch out/include/generated/vdso32-offsets.h
        echo "/* Généré automatiquement */" > out/include/generated/vdso32-offsets.h

        # 3. Court-circuit radical du VDSO32 (Élimine l'erreur sigreturn.S)
        echo "obj-y :=" > arch/arm64/kernel/vdso32/Makefile
        echo "targets :=" >> arch/arm64/kernel/vdso32/Makefile
        echo "clean-files :=" >> arch/arm64/kernel/vdso32/Makefile
        
        # On retire la dépendance vdso32 du Makefile principal
        sed -i 's/vdso_prepare\s*:\s*vdso32_prepare/vdso_prepare:/g' arch/arm64/Makefile
        sed -i 's/vdso32_prepare//g' arch/arm64/Makefile

        # 4. Détermination, validation et création forcée du defconfig attendu par le Makefile
        CONFIG_NAME=$(basename "${{ env.KERNEL_CONFIG }}")
        REAL_CONFIG_PATH=$(find arch/arm64/configs/ -type f -name "*sm8250*" | grep -i perf | head -n 1)
        
        if [ -z "$REAL_CONFIG_PATH" ]; then
            REAL_CONFIG_PATH=$(find arch/arm64/configs/ -type f -name "*sm8250*" | head -n 1)
        fi
        if [ -z "$REAL_CONFIG_PATH" ]; then
            REAL_CONFIG_PATH=$(find arch/arm64/configs/ -type f -name "*perf_defconfig*" | head -n 1)
        fi
        if [ -z "$REAL_CONFIG_PATH" ]; then
            echo "ATTENTION : Aucune config SM8250 trouvée, utilisation du defconfig de secours"
            REAL_CONFIG_PATH="arch/arm64/configs/defconfig"
        fi

        echo "Le script a déniché ce vrai fichier source : $REAL_CONFIG_PATH"

        mkdir -p arch/arm64/configs/vendor
        cp -f "$REAL_CONFIG_PATH" "arch/arm64/configs/vendor/$CONFIG_NAME"
        TARGET_CONFIG="arch/arm64/configs/vendor/$CONFIG_NAME"
        echo "Fichier de configuration cloné et prêt à l'emplacement requis : $TARGET_CONFIG"

        # 5. Injection des configurations spécifiques à l'appareil Kiev de Motorola
        MOTO_KIEV_CONFIG="arch/arm64/configs/vendor/ext_config/kiev-default.config"
        if [ -f "$MOTO_KIEV_CONFIG" ]; then
            echo "Fusion de la configuration spécifique Kiev ($MOTO_KIEV_CONFIG)..."
            cat "$MOTO_KIEV_CONFIG" >> "$TARGET_CONFIG"
        fi

        # 6. Maintien de la compatibilité 32 bits structurelle pour éviter l'erreur compat_uptr_t
        echo "Configuration de la compatibilité structurelle..."
        sed -i 's/CONFIG_COMPAT=n/CONFIG_COMPAT=y/g' "$TARGET_CONFIG"
        sed -i 's/CONFIG_VDSO32=y/CONFIG_VDSO32=n/g' "$TARGET_CONFIG"
        echo "CONFIG_COMPAT=y" >> "$TARGET_CONFIG"
        echo "CONFIG_VDSO32=n" >> "$TARGET_CONFIG"

        # 7. Création et injection du fragment personnalisé (KernelSU + Kprobes)
        echo "Création et injection du fragment de configuration KernelSU..."
        echo "CONFIG_MODULES=y" >> "$TARGET_CONFIG"
        echo "CONFIG_KPROBES=y" >> "$TARGET_CONFIG"
        echo "CONFIG_HAVE_KPROBES=y" >> "$TARGET_CONFIG"
        echo "CONFIG_KPROBE_EVENTS=y" >> "$TARGET_CONFIG"
        echo "CONFIG_OVERLAY_FS=y" >> "$TARGET_CONFIG"
        echo "CONFIG_ASSIST_SU=y" >> "$TARGET_CONFIG"

        # 8. Configurations conditionnelles
        if grep -q "CONFIG_KSU" "$TARGET_CONFIG"; then
            sed -i 's/# CONFIG_KSU is not set/CONFIG_KSU=y/g' "$TARGET_CONFIG"
            sed -i 's/CONFIG_KSU=n/CONFIG_KSU=y/g' "$TARGET_CONFIG"
        else
            echo "CONFIG_KSU=y" >> "$TARGET_CONFIG"
        fi

        if [ "${{ env.ADD_OVERLAYFS_CONFIG }}" = "true" ]; then
            echo "CONFIG_OVERLAY_FS=y" >> "$TARGET_CONFIG"
        fi
        if [ "${{ env.DISABLE-LTO }}" = "true" ]; then
            sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' "$TARGET_CONFIG"
            sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' "$TARGET_CONFIG"
            sed -i 's/CONFIG_THINLTO=y/CONFIG_THINLTO=n/' "$TARGET_CONFIG"
            echo "CONFIG_LTO_NONE=y" >> "$TARGET_CONFIG"
        fi
        if [ "${{ env.DISABLE_CC_WERROR }}" = "true" ]; then
            echo "CONFIG_CC_WERROR=n" >> "$TARGET_CONFIG"
        fi

        # 9. Correctif structurel pour mmu_notifier.h via injection directe
        echo "Application du correctif mmu_notifier.h..."
        sed -i '/^enum mmu_notifier_event {/,/^};/d' include/linux/mmu_notifier.h
        sed -i '/#define _LINUX_MMU_NOTIFIER_H/a \\nenum mmu_notifier_event {\n\tMMU_NOTIFIER_UNREGISTER,\n\tMMU_NOTIFIER_RELEASE,\n};' include/linux/mmu_notifier.h

        # 10. Forcer l'utilisation de formats de débogage standard rétrocompatibles
        echo "Optimisation des formats de débogage..."
        echo "CONFIG_DEBUG_INFO_DWARF4=y" >> "$TARGET_CONFIG"
        sed -i 's/CONFIG_DEBUG_INFO_DWARF5=y/CONFIG_DEBUG_INFO_DWARF4=y/g' "$TARGET_CONFIG"

        # 11. Masquage de l'ancien objcopy et strip par les versions LLVM de Clang
        echo "Forçage de la redirection objcopy et strip vers LLVM..."
        CLANG_BIN_DIR=$(dirname $(find $GITHUB_WORKSPACE/kernel_workspace -name "clang" -type f | head -n 1))
        if [ -d "$CLANG_BIN_DIR" ]; then
            ln -sf "$CLANG_BIN_DIR/llvm-objcopy" "$CLANG_BIN_DIR/aarch64-linux-gnu-objcopy"
            ln -sf "$CLANG_BIN_DIR/llvm-objcopy" "$CLANG_BIN_DIR/objcopy"
            ln -sf "$CLANG_BIN_DIR/llvm-strip" "$CLANG_BIN_DIR/aarch64-linux-gnu-strip"
            ln -sf "$CLANG_BIN_DIR/llvm-strip" "$CLANG_BIN_DIR/strip"
            echo "$CLANG_BIN_DIR" >> $GITHUB_PATH
        fi

        # 12. Injection des macros de secours VDSO32 au début de signal32.c
        echo "Application du patch de compatibilité absolue pour signal32.c..."
        SIGNAL_FILE="arch/arm64/kernel/signal32.c"
        if [ -f "$SIGNAL_FILE" ]; then
            # On injecte directement les définitions manquantes à la ligne 1 du fichier
            sed -i '1i #define vdso_offset_compat_rt_sigreturn_thumb 0\n#define vdso_offset_compat_rt_sigreturn_arm 0\n#define vdso_offset_compat_sigreturn_thumb 0\n#define vdso_offset_compat_sigreturn_arm 0\n#define VDSO_LBASE 0' "$SIGNAL_FILE"
            echo "[+] Variables factices VDSO32 injectées avec succès dans signal32.c."
        fi

        # 13. Correctif pour l'erreur EFI mmap_sem -> mmap_lock
        echo "Application du correctif pour drivers/firmware/efi/efi.c..."
        EFI_FILE="drivers/firmware/efi/efi.c"
        if [ -f "$EFI_FILE" ]; then
            sed -i 's/\.mmap_sem\s*=\s*__RWSEM_INITIALIZER(efi_mm\.mmap_sem)/\.mmap_lock = __RWSEM_INITIALIZER(efi_mm\.mmap_lock)/g' "$EFI_FILE"
            echo "[+] efi.c a été patché avec succès pour utiliser mmap_lock."
        fi

        # 14. Correctif de compatibilité KernelSU pour les noyaux plus anciens (MODULE_IMPORT_NS)
        echo "Application du correctif pour KernelSU MODULE_IMPORT_NS..."
        KSU_INIT_FILE="drivers/kernelsu/core/init.c"
        if [ -f "$KSU_INIT_FILE" ]; then
            sed -i '1i #ifndef MODULE_IMPORT_NS\n#define MODULE_IMPORT_NS(ns)\n#endif' "$KSU_INIT_FILE"
            echo "[+] Patch de compatibilité appliqué sur init.c avec succès."
        fi

        # 15. Nettoyage du Makefile des DTS pour éviter le Segmentation Fault sur Bengal
        echo "Nettoyage du Makefile des DTS pour contourner le Segfault Bengal..."
        DTS_MAKEFILE="arch/arm64/boot/dts/vendor/qcom/Makefile"
        if [ -f "$DTS_MAKEFILE" ]; then
            sed -i '/bengal/d' "$DTS_MAKEFILE"
            echo "[+] Références à bengal retirées du Makefile des DTS."
        fi
        
        # 16. Injection propre du Hook KernelSU pour Noyau NON-GKI (fs/open.c)
        echo "Application du patch de hooking précis Non-GKI (fs/open.c)..."
        if [ -f "fs/open.c" ]; then
            sed -i '/ksu_handle_open/d' "fs/open.c"
            sed -i '/int do_dentry_open(/,/^[}]/s/return 0;/{ extern int ksu_handle_open(struct file *file); ksu_handle_open(f); } return 0;/g' "fs/open.c"
        fi

        # 17. Injection globale des symboles VDSO32 manquants dans vdso.c
        if [ -f "arch/arm64/kernel/vdso.c" ]; then
            sed -i '1i char vdso32_start[] = {};\nchar vdso32_end[] = {};' "arch/arm64/kernel/vdso.c"
        fi

        # 18. Stub complet pour TOUS les Vendor Hooks Android manquants
        echo "Génération des stubs de secours pour l'intégralité des Vendor Hooks..."
        if [ -f "kernel/trace/trace.c" ]; then
            # Nettoyage d'éventuels doublons
            sed -i '/_tracepoint_android_vh_/d' "kernel/trace/trace.c"
            
            # Injection de la liste exhaustive réclamée par LineageOS
            echo -e '\n/* Secours Tracepoints GKI pour compilation Non-GKI */' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_set_memory_ro;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_set_memory_x;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_check_file_open;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_check_mmap_file;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_set_memory_rw;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_set_memory_nx;' >> "kernel/trace/trace.c"
            echo 'struct tracepoint __tracepoint_android_vh_check_bpf_syscall;' >> "kernel/trace/trace.c"
            echo "[+] Les 7 tracepoints obsolètes ont été neutralisés."
        fi

        # 19. Forcer l'inclusion de KernelSU dans le système de build principal
        echo "Liaison explicite de KernelSU dans le Makefile des drivers..."
        if [ -f "drivers/Makefile" ]; then
            if ! grep -q "kernelsu" "drivers/Makefile"; then
                echo "obj-y += kernelsu/" >> "drivers/Makefile"
                echo "[+] KernelSU ajouté manuellement au drivers/Makefile"
            fi
        fi
        
    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.LOCALVERSION }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        
        if [ ! -z "${{ env.KSU_EXPECTED_SIZE }}" ] && [ ! -z "${{ env.KSU_EXPECTED_HASH }}" ]; then
          export KSU_EXPECTED_SIZE=${{ env.KSU_EXPECTED_SIZE }}
          export KSU_EXPECTED_HASH=${{ env.KSU_EXPECTED_HASH }}
        fi
        
        # 1. Génération de la configuration
        make O=out ARCH=${{ env.ARCH }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- STRIP=llvm-strip ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }} ${{ env.KERNEL_CONFIG }}
        
        # 2. Tentative de compilation rapide (Multi-cœurs)
        echo "========================================================="
        echo " Lancement de la compilation principale (Multi-cœurs) "
        echo "========================================================="
        if [ "${{ env.ENABLE_CCACHE }}" = "true" ]; then
            make -j$(nproc --all) CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- STRIP=llvm-strip O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }} || MULTI_FAILED=true
        else
            make -j$(nproc --all) CC=clang CLANG_TRIPLE=aarch64-linux-gnu- STRIP=llvm-strip O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }} || MULTI_FAILED=true
        fi

        # 3. Mode Secours (Mono-cœur) pour isoler l'erreur si échec
        if [ "$MULTI_FAILED" = "true" ]; then
            echo "========================================================="
            echo " Échec détecté ! Relance en mode mono-cœur (-j1) pour "
            echo " isoler la ligne d'erreur exacte...                      "
            echo "========================================================="
            if [ "${{ env.ENABLE_CCACHE }}" = "true" ]; then
                make -j1 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- STRIP=llvm-strip O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }}
            else
                make -j1 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- STRIP=llvm-strip O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }}
            fi
        fi

    - name: Make Anykernel3
      if: env.CHECK_FILE_IS_OK == 'true' && env.USE_CUSTOM_ANYKERNEL3 != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        if [ "${{ env.CHECK_DTBO_IS_OK }}" = "true" ]; then
            cp android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/
        fi
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Make Custom-Anykernel3
      if: env.CHECK_FILE_IS_OK == 'true' && env.USE_CUSTOM_ANYKERNEL3 == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [[ ${{ env.CUSTOM_ANYKERNEL3_SOURCE }} =~ git ]]; then
            if [[ ${{ env.CUSTOM_ANYKERNEL3_SOURCE }} == *'.tar.gz' ]]; then
                wget -O AnyKernel3.tar.gz ${{ env.CUSTOM_ANYKERNEL3_SOURCE }}
                mkdir AnyKernel3
                tar -C AnyKernel3/ -zxvf AnyKernel3.tar.gz
            else
                git clone ${{ env.CUSTOM_ANYKERNEL3_SOURCE }} -b ${{ env.CUSTOM_ANYKERNEL3_BRANCH }} --depth=1 AnyKernel3
            fi
        else
            wget -O AnyKernel3.zip ${{ env.CUSTOM_ANYKERNEL3_SOURCE }}
            mkdir AnyKernel3
            unzip AnyKernel3.zip -d AnyKernel3/
        fi
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        if [ "${{ env.CHECK_DTBO_IS_OK }}" = "true" ]; then
            cp android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/
        fi
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Make boot image
      if: env.HAVE_SOURCE_BOOT_IMAGE == 'true' && env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        python3 tools/unpack_bootimg.py --boot_img boot-source.img
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} out/kernel
        python3 tools/mkbootimg.py ${{ env.FORMAT_MKBOOTING }} -o boot.img
        if [ -f boot.img ]; then
            echo "MAKE_BOOT_IMAGE_IS_OK=true" >> $GITHUB_ENV
        else
            echo "Boot image is empty"
            exit 1
        fi

    - name: Upload Kernel Image
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_IMAGE_NAME }}${{ env.LOCALVERSION }}${{ env.UPLOADNAME }}-${{ env.DEVICE }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3${{ env.LOCALVERSION }}${{ env.UPLOADNAME }}-${{ env.DEVICE }}
        path: kernel_workspace/AnyKernel3/*

    - name: Upload DTBO image
      if: env.CHECK_DTBO_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dtbo-${{ env.DEVICE }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img

    - name: Upload boot image
      if: env.MAKE_BOOT_IMAGE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: boot${{ env.LOCALVERSION }}${{ env.UPLOADNAME }}-${{ env.DEVICE }}
        path: kernel_workspace/boot.img
